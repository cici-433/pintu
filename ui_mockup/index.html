<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旧时光照相馆 - UI原型</title>
    <style>
        :root {
            --paper-color: #f2e7d6;
            --paper-color-2: #eadcc6;
            --ink-color: #3a332c;
            --ink-soft: rgba(58, 51, 44, 0.45);
            --accent-color: #b98a4c;
            --accent-blue: #4f88ab;
            --accent-orange: #f0aa3e;
            --highlight-color: #d45d3e;
            --ui-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Songti SC", "SimSun", serif;
            /* 衬线体 */
            background-color: #2c241b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--ink-color);
        }

        /* 手机外壳模拟 */
        .phone-mockup {
            width: 390px;
            height: 844px;
            background-color: var(--paper-color);
            position: relative;
            overflow: hidden;
            box-shadow: var(--ui-shadow);
            /* 老照片纹理叠加 */
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.1"/></svg>');
            background-blend-mode: multiply;
        }

        /* 通用样式 */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 0;
            box-sizing: border-box;
            transition: transform 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        h1,
        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.4);
        }

        h1 {
            font-size: 32px;
            border-bottom: 2px double var(--ink-color);
            padding-bottom: 10px;
            margin-top: 60px;
        }

        /* 按钮样式 */
        .btn {
            background-color: var(--accent-color);
            color: var(--paper-color);
            border: 2px solid var(--ink-color);
            padding: 12px 24px;
            margin: 10px auto;
            font-family: inherit;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 3px 3px 0 var(--ink-color);
            transition: all 0.1s;
            text-align: center;
            width: 80%;
            display: block;
            border-radius: 4px;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 var(--ink-color);
        }

        .btn-small {
            width: auto;
            display: inline-block;
            padding: 8px 16px;
            font-size: 14px;
        }

        .countdown-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border: 1px dashed var(--ink-color);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.8);
        }

        /* 首页/游戏：按截图风格重构 */
        .paper-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(1200px 900px at 50% 20%, rgba(255, 255, 255, 0.55) 0%, rgba(255, 255, 255, 0.1) 55%, rgba(0, 0, 0, 0.08) 100%),
                linear-gradient(180deg, rgba(234, 220, 198, 0.85) 0%, rgba(242, 231, 214, 0.95) 40%, rgba(242, 231, 214, 0.95) 100%);
            filter: saturate(0.95) contrast(1.02);
        }

        .screen-home {
            justify-content: flex-end;
        }

        .home-illustration {
            position: absolute;
            inset: 96px 0 120px 0;
            background:
                linear-gradient(180deg, rgba(0, 0, 0, 0.12), rgba(0, 0, 0, 0) 30%),
                radial-gradient(900px 700px at 65% 35%, rgba(90, 70, 40, 0.22) 0%, rgba(90, 70, 40, 0) 60%),
                linear-gradient(180deg, rgba(232, 220, 200, 0) 0%, rgba(232, 220, 200, 0) 65%, rgba(232, 220, 200, 0.7) 100%);
            opacity: 0.75;
        }

        .safe {
            position: relative;
            height: 100%;
            padding: 18px 16px 16px;
            box-sizing: border-box;
        }

        .home-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 6px;
        }

        .pill-row {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .pill {
            height: 28px;
            padding: 0 10px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: 999px;
            background: rgba(60, 60, 60, 0.28);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.22) inset;
            color: rgba(255, 255, 255, 0.92);
            font-family: system-ui, -apple-system, "PingFang SC", "Songti SC", serif;
            font-size: 14px;
            letter-spacing: 0.2px;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        .pill .dot-sep {
            width: 1px;
            height: 14px;
            background: rgba(255, 255, 255, 0.25);
        }

        .icon-btn {
            width: 52px;
            height: 28px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.35);
            color: rgba(40, 35, 28, 0.8);
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
            cursor: pointer;
        }

        .pill-heart {
            width: 18px;
            height: 18px;
            border-radius: 999px;
            background: radial-gradient(circle at 30% 30%, #ff8a8a 0%, #e23a3a 65%, #c22525 100%);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.35) inset;
        }

        .pill-photo {
            width: 18px;
            height: 12px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.32);
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .pill-plus {
            width: 22px;
            height: 22px;
            border-radius: 7px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: linear-gradient(180deg, rgba(216, 184, 110, 0.95) 0%, rgba(190, 148, 70, 0.95) 100%);
            color: rgba(255, 255, 255, 0.95);
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
        }

        .pill-countdown {
            font-size: 12px;
            opacity: 0.9;
            white-space: nowrap;
            display: none;
        }

        .side-stack {
            position: absolute;
            left: 14px;
            top: 98px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .side-item {
            width: 62px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .side-circle {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.55);
            border: 2px solid rgba(90, 80, 60, 0.35);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.16);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(60, 50, 35, 0.8);
            font-size: 24px;
        }

        .side-label {
            font-size: 12px;
            color: rgba(50, 40, 30, 0.8);
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .reward {
            position: absolute;
            right: 18px;
            top: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            z-index: 10;
        }

        .reward-badge {
            width: 54px;
            height: 54px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.55);
            border: 2px solid rgba(90, 80, 60, 0.35);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.16);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(60, 50, 35, 0.8);
            font-size: 28px;
        }

        .cta-stack {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 138px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            z-index: 10;
        }

        .cta-btn {
            width: 290px;
            height: 64px;
            border-radius: 18px;
            border: 2px solid rgba(60, 50, 35, 0.35);
            box-shadow: 0 10px 0 rgba(0, 0, 0, 0.18);
            font-family: "Songti SC", "SimSun", serif;
            font-size: 22px;
            letter-spacing: 2px;
            color: rgba(40, 30, 20, 0.9);
            cursor: pointer;
        }

        .cta-orange {
            background: linear-gradient(180deg, rgba(245, 191, 86, 1) 0%, rgba(234, 160, 54, 1) 100%);
        }

        .cta-blue {
            background: linear-gradient(180deg, rgba(121, 170, 198, 1) 0%, rgba(79, 136, 171, 1) 100%);
            color: rgba(255, 255, 255, 0.92);
        }

        .tabbar {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 96px;
            background: linear-gradient(180deg, rgba(234, 220, 198, 0.05) 0%, rgba(234, 220, 198, 0.88) 55%, rgba(234, 220, 198, 0.98) 100%);
            border-top: 1px solid rgba(60, 50, 35, 0.2);
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 10px 12px 14px;
            box-sizing: border-box;
            z-index: 10;
        }

        .tab {
            width: 92px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            border: 0;
            background: transparent;
            font-family: "Songti SC", "SimSun", serif;
            color: rgba(60, 50, 35, 0.75);
            cursor: pointer;
        }

        .tab .tab-icon {
            width: 54px;
            height: 40px;
            border-radius: 10px;
            background: rgba(120, 100, 70, 0.18);
            border: 2px solid rgba(60, 50, 35, 0.25);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .tab.active .tab-icon {
            background: rgba(120, 100, 70, 0.32);
            border-color: rgba(60, 50, 35, 0.35);
        }

        .tab .tab-label {
            font-size: 14px;
        }

        .screen-game .game-header {
            position: absolute;
            left: 0;
            right: 0;
            top: 14px;
            display: flex;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
        }

        .level-pill {
            min-width: 170px;
            height: 44px;
            padding: 0 18px;
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(244, 236, 220, 0.95) 0%, rgba(232, 220, 198, 0.95) 100%);
            border: 2px solid rgba(90, 80, 60, 0.35);
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Songti SC", "SimSun", serif;
            font-size: 22px;
            color: rgba(40, 30, 20, 0.9);
            pointer-events: auto;
        }

        .game-time {
            position: absolute;
            top: 66px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 10;
            font-family: system-ui, -apple-system, "PingFang SC", sans-serif;
            font-weight: 600;
            color: rgba(60, 50, 35, 0.75);
        }

        .game-time #step-display {
            display: none;
        }

        .screen-game .game-side-left {
            position: absolute;
            left: 14px;
            top: 14px;
            z-index: 10;
        }

        .screen-game .energy-hidden {
            display: none !important;
        }

        /* 关卡选择 */
        .album-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 10px;
        }

        .album-item {
            border: 2px solid var(--ink-color);
            background: #fff;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            transform: rotate(-2deg);
        }

        .album-item:nth-child(even) {
            transform: rotate(2deg);
        }

        .album-cover {
            width: 100%;
            height: 80px;
            background-color: #ddd;
            margin-bottom: 8px;
            border: 1px dashed #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #666;
        }

        /* 游戏界面 */
        .top-bar,
        .status-bar {
            display: none;
        }

        .puzzle-board {
            width: 330px;
            height: 460px;
            margin: 120px auto 0;
            background-color: rgba(255, 255, 255, 0.55);
            border: 2px solid rgba(60, 50, 35, 0.25);
            display: grid;
            gap: 6px;
            padding: 8px;
            border-radius: 16px;
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.12);
        }

        .puzzle-piece {
            background-color: rgba(255, 255, 255, 0.78);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: rgba(60, 50, 35, 0.7);
            cursor: pointer;
            position: relative;
            border-radius: 10px;
            border: 2px solid rgba(30, 20, 10, 0.7);
            background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.75), rgba(255, 255, 255, 0.55));
            box-shadow: 0 2px 0 rgba(255, 255, 255, 0.55) inset;
        }

        .puzzle-piece.empty {
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed rgba(60, 50, 35, 0.2);
            cursor: default;
        }

        /* 底部操作栏 */
        .bottom-actions {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 16px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 0 12px;
            box-sizing: border-box;
            z-index: 10;
        }

        .tool {
            width: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            border: 0;
            background: transparent;
            font-family: "Songti SC", "SimSun", serif;
            color: rgba(60, 50, 35, 0.75);
            cursor: pointer;
            position: relative;
        }

        .tool-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.55);
            border: 2px solid rgba(90, 80, 60, 0.3);
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .tool-badge {
            position: absolute;
            top: 4px;
            right: 24px;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 999px;
            background: rgba(68, 94, 198, 0.95);
            color: white;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.18);
        }

        /* 弹窗 */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background-color: var(--paper-color);
            width: 80%;
            padding: 20px;
            border: 4px double var(--ink-color);
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .stamp {
            border: 2px solid var(--highlight-color);
            color: var(--highlight-color);
            font-weight: bold;
            padding: 5px 10px;
            display: inline-block;
            transform: rotate(-15deg);
            font-size: 24px;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        /* 复古滤镜 */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(0, 0, 0, 0) 60%, rgba(60, 40, 20, 0.4) 100%);
            z-index: 999;
        }
    </style>
</head>

<body>

    <div class="phone-mockup">
        <div class="vignette"></div>
        <div class="paper-bg"></div>
        <div class="home-illustration"></div>

        <!-- 1. 首页 -->
        <div id="main-menu" class="screen screen-home">
            <div class="safe">
                <div class="home-top">
                    <div class="pill-row">
                        <div id="energy-box" class="pill">
                            <span class="pill-heart"></span>
                            <span id="energy-display">5</span>
                            <span style="opacity:0.8;">/5</span>
                            <button id="energy-plus" class="pill-plus" onclick="openEnergyModal()">+</button>
                            <span id="energy-countdown" class="pill-countdown"></span>
                        </div>
                    </div>
                </div>

                <div class="side-stack">
                    <div class="side-item">
                        <div class="side-circle" onclick="showSettings()">⚙</div>
                        <div class="side-label">设置</div>
                    </div>
                </div>

                <div class="cta-stack">
                    <button class="cta-btn cta-orange" onclick="checkEnergyAndStart()">开始游戏</button>
                    <button class="cta-btn cta-blue" onclick="showGallery()">相册</button>
                </div>

                <div class="tabbar">
                    <button class="tab" onclick="showGallery()">
                        <div class="tab-icon">📒</div>
                        <div class="tab-label">相册</div>
                    </button>
                    <button class="tab active" onclick="showScreen('main-menu')">
                        <div class="tab-icon">🏠</div>
                        <div class="tab-label">首页</div>
                    </button>
                    <button class="tab" onclick="alert('暂未开放')">
                        <div class="tab-icon">📷</div>
                        <div class="tab-label">年代回忆</div>
                    </button>
                </div>
            </div>
        </div>

        <!-- 2. 关卡选择 (开始营业) -->
        <div id="level-select" class="screen hidden">
            <div class="top-bar">
                <button class="btn btn-small" onclick="showScreen('main-menu')">← 返回</button>
                <h2>选择胶卷</h2>
                <div style="font-size: 12px; border: 1px solid var(--ink-color); padding: 2px 5px; border-radius: 4px;">
                    ⚡ 5/5</div>
            </div>

            <div class="album-grid" id="level-grid">
                <!-- JS 生成 -->
            </div>
        </div>

        <!-- 3. 我的相册 (已收集) -->
        <div id="gallery" class="screen hidden">
            <div class="top-bar">
                <button class="btn btn-small" onclick="showScreen('main-menu')">← 返回</button>
                <h2>我的相册</h2>
                <div style="width: 60px;"></div>
            </div>

            <div class="album-grid" id="gallery-grid">
                <!-- JS 生成 -->
                <div style="text-align: center; width: 100%; margin-top: 50px; opacity: 0.6;" id="gallery-empty-msg">
                    暂无照片，快去“开始营业”收集吧！
                </div>
            </div>
        </div>

        <!-- 4. 游戏界面 -->
        <div id="gameplay" class="screen screen-game hidden">
            <div class="safe">
                <div id="energy-box-game" class="pill energy-hidden">
                    <span class="pill-heart"></span>
                    <span id="energy-display-game">5</span>
                    <span style="opacity:0.8;">/5</span>
                    <button id="energy-plus-game" class="pill-plus" onclick="openEnergyModal()">+</button>
                    <span id="energy-countdown-game" class="pill-countdown"></span>
                </div>

                <div class="game-side-left">
                    <div class="side-item">
                        <div class="side-circle" onclick="showSettings()">⚙</div>
                        <div class="side-label">设置</div>
                    </div>
                </div>

                <div class="game-header">
                    <div id="level-title" class="level-pill">第1关</div>
                </div>

                <div class="game-time">
                    <span id="time-display">00:00</span>
                    <span id="step-display">STEP: 0</span>
                </div>

                <div id="board" class="puzzle-board"></div>

                <div class="bottom-actions">
                    <button class="tool" onclick="showPreview()">
                        <div class="tool-icon">💡</div>
                        <div>提示</div>
                        <div class="tool-badge">1</div>
                    </button>
                    <button class="tool" onclick="showPreview()">
                        <div class="tool-icon">🖼</div>
                        <div>拼图显示</div>
                    </button>
                    <button class="tool" onclick="alert('暂未开放')">
                        <div class="tool-icon">❄</div>
                        <div>冰冻</div>
                        <div class="tool-badge">2</div>
                    </button>
                    <button style="display:none" onclick="showResult()">直接胜利</button>
                </div>
            </div>
        </div>

        <!-- 4. 排行榜 -->
        <div id="leaderboard" class="screen hidden">
            <div class="top-bar">
                <button class="btn btn-small" onclick="showScreen('main-menu')">← 返回</button>
                <h2>光荣榜</h2>
                <div style="width: 60px;"></div>
            </div>

            <div
                style="background: rgba(255,255,255,0.5); padding: 10px; border: 1px solid var(--ink-color); margin-bottom: 10px;">
                <div
                    style="display: flex; justify-content: space-between; border-bottom: 1px dashed var(--ink-color); padding: 5px 0;">
                    <span>1. 张三</span>
                    <span>00:32</span>
                </div>
                <div
                    style="display: flex; justify-content: space-between; border-bottom: 1px dashed var(--ink-color); padding: 5px 0;">
                    <span>2. 李四</span>
                    <span>00:45</span>
                </div>
                <div
                    style="display: flex; justify-content: space-between; border-bottom: 1px dashed var(--ink-color); padding: 5px 0;">
                    <span>3. 王五</span>
                    <span>01:12</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 5px 0; opacity: 0.6;">
                    <span>...</span>
                    <span>...</span>
                </div>
                <div
                    style="display: flex; justify-content: space-between; padding: 5px 0; font-weight: bold; color: var(--highlight-color);">
                    <span>10. 我</span>
                    <span>02:30</span>
                </div>
            </div>
        </div>

        <!-- 5. 设置弹窗 -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <h3>设 置</h3>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <span>背景音乐</span>
                    <div style="width: 50px; height: 24px; background: var(--accent-color); border-radius: 12px; position: relative; cursor: pointer;"
                        onclick="toggleSwitch(this)">
                        <div
                            style="width: 20px; height: 20px; background: #fff; border-radius: 50%; position: absolute; right: 2px; top: 2px; transition: all 0.3s;">
                        </div>
                    </div>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <span>音效</span>
                    <div style="width: 50px; height: 24px; background: var(--accent-color); border-radius: 12px; position: relative; cursor: pointer;"
                        onclick="toggleSwitch(this)">
                        <div
                            style="width: 20px; height: 20px; background: #fff; border-radius: 50%; position: absolute; right: 2px; top: 2px; transition: all 0.3s;">
                        </div>
                    </div>
                </div>

                <hr style="border: 0; border-top: 1px dashed var(--ink-color); margin: 30px 0;">

                <div style="text-align: center; font-size: 12px; opacity: 0.6;">
                    版本: v1.0.0<br>
                    用户ID: 8848
                </div>

                <div style="display:flex; gap:12px; justify-content:center; margin-top: 20px;">
                    <button id="settings-back" class="btn btn-small hidden" onclick="exitGameFromSettings()">返
                        回</button>
                    <button class="btn btn-small" onclick="hideSettings()">关 闭</button>
                </div>
            </div>
        </div>

        <!-- 6. 结算弹窗 -->
        <div id="result-modal" class="modal hidden">
            <div class="modal-content">
                <div class="stamp">修 复 成 功</div>

                <div
                    style="margin: 20px auto; width: 150px; height: 150px; background: #fff; border: 4px solid #fff; box-shadow: 0 0 5px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 50px;">
                    🧸
                </div>

                <div style="font-family: monospace; margin-bottom: 15px;">
                    耗时: <span id="result-time">00:00</span><br>
                    步数: <span id="result-step">0</span>
                </div>

                <p style="font-style: italic; margin-bottom: 25px;">"那是1984年的夏天，蝉鸣声特别响..."</p>

                <button class="btn" onclick="nextLevel()">下 一 张</button>
                <button class="btn" style="background-color: #4a90e2; color: white;">分 享</button>
            </div>
        </div>

        <!-- 7. 原图预览弹窗 -->
        <div id="preview-modal" class="modal hidden">
            <div class="modal-content">
                <h3>目标图片</h3>
                <div
                    style="margin: 10px auto; width: 200px; height: 200px; background: #e0d0b0; border: 2px solid var(--ink-color); display: flex; align-items: center; justify-content: center; font-size: 60px;">
                    🧸
                </div>
                <div style="font-size: 12px; margin-bottom: 20px; color: #666;">(倒计时: 5s)</div>
                <button class="btn btn-small" onclick="hidePreview()">关 闭</button>
            </div>
        </div>

        <!-- 8. 体力不足弹窗 -->
        <div id="energy-modal" class="modal hidden">
            <div class="modal-content">
                <h3>体力不足</h3>
                <div style="font-size: 40px; margin: 20px;">⚡ 0/5</div>
                <div id="energy-next-restore" style="font-size: 12px; opacity: 0.8; margin-bottom: 10px;"></div>
                <p>休息一下吧，或者观看一段回忆录（广告）来恢复体力。</p>
                <button class="btn" onclick="recoverOne()">观看广告 (+1⚡)</button>
                <button class="btn" style="background: transparent; font-size: 14px;"
                    onclick="hideEnergy()">稍后再来</button>
            </div>
        </div>

    </div>

    <script>
        function showScreen(screenId) {
            // 隐藏所有屏幕
            document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
            // 显示目标屏幕
            document.getElementById(screenId).classList.remove('hidden');
        }

        function exitGame() {
            stopTimer();
            showScreen('main-menu');
        }

        function exitGameFromSettings() {
            hideSettings();
            exitGame();
        }

        const LEVEL_COUNT = 100;
        const levels = Array.from({ length: LEVEL_COUNT }, (_, i) => {
            const id = i + 1;
            let size = 6;
            if (id === 1) size = 3;
            else if (id === 2) size = 4;
            else if (id === 3) size = 5;
            return { id, name: `第 ${id} 关`, size, icon: "🧸" };
        });

        // 玩家进度：已收集的图片ID列表
        let collectedPhotos = [];
        let currentLevelId = 0;

        const ENERGY_KEY = 'oldtime_energy_v1';
        const DAILY_MAX = 5;
        const RECOVER_INTERVAL_MS = 10 * 60 * 1000; // 10分钟

        function todayStr() {
            const d = new Date();
            return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
        }

        function loadEnergy() {
            try {
                const raw = localStorage.getItem(ENERGY_KEY);
                if (raw) {
                    return JSON.parse(raw);
                }
            } catch (_) { }
            return { remaining: DAILY_MAX, date: todayStr(), lastRecoverAt: null };
        }

        function saveEnergy(state) {
            localStorage.setItem(ENERGY_KEY, JSON.stringify(state));
        }

        function resetIfCrossDay(state) {
            const t = todayStr();
            if (state.date !== t) {
                state.remaining = DAILY_MAX;
                state.date = t;
                state.lastRecoverAt = null;
            }
            return state;
        }

        function formatMs(ms) {
            const s = Math.max(0, Math.floor(ms / 1000));
            const mm = String(Math.floor(s / 60)).padStart(2, '0');
            const ss = String(s % 60).padStart(2, '0');
            return `${mm}:${ss}`;
        }

        function updateCountdown() {
            const state = resetIfCrossDay(loadEnergy());
            saveEnergy(state);
            const display = document.getElementById('energy-display');
            const cd = document.getElementById('energy-countdown');
            const plusHome = document.getElementById('energy-plus');
            const displayGame = document.getElementById('energy-display-game');
            const cdGame = document.getElementById('energy-countdown-game');
            const plusGame = document.getElementById('energy-plus-game');
            if (display) display.innerText = String(state.remaining);
            if (cd) cd.innerText = '';
            if (plusHome) {
                plusHome.style.display = state.remaining < DAILY_MAX ? 'inline-block' : 'none';
            }
            if (displayGame) {
                displayGame.innerText = String(state.remaining);
            }
            if (cdGame) {
                cdGame.innerText = '';
            }
            if (plusGame) {
                plusGame.style.display = state.remaining < DAILY_MAX ? 'inline-block' : 'none';
            }
            const modalInfo = document.getElementById('energy-next-restore');
            if (modalInfo) {
                if (state.remaining < DAILY_MAX && state.lastRecoverAt) {
                    const nextTs = state.lastRecoverAt + RECOVER_INTERVAL_MS;
                    const now = Date.now();
                    const left = Math.max(0, nextTs - now);
                    modalInfo.innerText = `预计恢复: ${formatMs(left)}`;
                    modalInfo.style.display = 'block';
                } else {
                    modalInfo.style.display = 'none';
                }
            }
        }

        function tickRecovery() {
            let state = resetIfCrossDay(loadEnergy());
            if (state.remaining < DAILY_MAX) {
                const now = Date.now();
                if (!state.lastRecoverAt) {
                    state.lastRecoverAt = now;
                } else {
                    const elapsed = now - state.lastRecoverAt;
                    if (elapsed >= RECOVER_INTERVAL_MS) {
                        const steps = Math.floor(elapsed / RECOVER_INTERVAL_MS);
                        state.remaining = Math.min(DAILY_MAX, state.remaining + steps);
                        state.lastRecoverAt = state.lastRecoverAt + steps * RECOVER_INTERVAL_MS;
                        saveEnergy(state);
                        updateCountdown();
                    }
                }
            }
            updateCountdown();
        }

        function consumeOne() {
            let state = resetIfCrossDay(loadEnergy());
            if (state.remaining > 0) {
                state.remaining -= 1;
                if (state.remaining < DAILY_MAX && !state.lastRecoverAt) {
                    state.lastRecoverAt = Date.now();
                }
                saveEnergy(state);
                updateCountdown();
                return true;
            }
            return false;
        }

        function recoverOne() {
            let state = resetIfCrossDay(loadEnergy());
            if (state.remaining < DAILY_MAX) {
                state.remaining += 1;
                if (state.remaining >= DAILY_MAX) {
                    state.lastRecoverAt = null;
                } else {
                    state.lastRecoverAt = Date.now();
                }
                saveEnergy(state);
                updateCountdown();
            }
            hideEnergy();
        }

        function openEnergyModal() {
            document.getElementById('energy-modal').classList.remove('hidden');
            updateCountdown();
        }

        function checkEnergyAndStart() {
            if (consumeOne()) {
                startGame(1);
            } else {
                openEnergyModal();
            }
        }

        function renderLevelSelect() {
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';

            levels.forEach(level => {
                const isLocked = level.size === 0 || level.desc === "待解锁";
                const isCollected = collectedPhotos.includes(level.id);

                const item = document.createElement('div');
                item.className = 'album-item';
                if (isLocked) item.style.opacity = '0.6';

                // 标记已完成
                const mark = isCollected ? '<div style="position:absolute; top:5px; right:5px; color:green;">✓</div>' : '';

                item.innerHTML = `
                    <div class="album-cover" style="position:relative;">${level.icon}${mark}</div>
                    <div>${level.name}<br><small>(${level.desc})</small></div>
                `;

                if (!isLocked) {
                    item.onclick = () => startGame(level.id);
                }
                grid.appendChild(item);
            });
        }

        function showGallery() {
            renderGallery();
            showScreen('gallery');
        }

        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            const emptyMsg = document.getElementById('gallery-empty-msg');
            grid.innerHTML = '';

            if (collectedPhotos.length === 0) {
                grid.appendChild(emptyMsg);
                emptyMsg.style.display = 'block';
                return;
            }

            emptyMsg.style.display = 'none';

            collectedPhotos.forEach(id => {
                const level = levels.find(l => l.id === id);
                if (!level) return;

                const item = document.createElement('div');
                item.className = 'album-item';
                item.innerHTML = `
                    <div class="album-cover" style="border-color: var(--highlight-color);">${level.icon}</div>
                    <div>${level.name}</div>
                `;
                item.onclick = () => alert(`查看大图：${level.name}`);
                grid.appendChild(item);
            });
        }

        // ---- 拼图交互与计时 ----
        let boardState = [];
        let emptyIndex = 0;
        let stepCount = 0;
        let startTs = 0;
        let timerId = null;

        function formatTime(ms) {
            const sec = Math.floor(ms / 1000);
            const m = String(Math.floor(sec / 60)).padStart(2, '0');
            const s = String(sec % 60).padStart(2, '0');
            return `${m}:${s}`;
        }
        function startTimer() {
            startTs = Date.now();
            stopTimer();
            timerId = setInterval(() => {
                const elapsed = Date.now() - startTs;
                const timeEl = document.getElementById('time-display');
                if (timeEl) timeEl.innerText = formatTime(elapsed);
            }, 250);
        }
        function stopTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
        }
        function getNeighbors(idx, size) {
            const r = Math.floor(idx / size);
            const c = idx % size;
            const res = [];
            if (r > 0) res.push((r - 1) * size + c);
            if (r < size - 1) res.push((r + 1) * size + c);
            if (c > 0) res.push(r * size + (c - 1));
            if (c < size - 1) res.push(r * size + (c + 1));
            return res;
        }
        function createSolved(size) {
            const total = size * size;
            const arr = [];
            for (let i = 1; i < total; i++) arr.push(i);
            arr.push(0);
            return arr;
        }
        function shuffleBoard(size) {
            boardState = createSolved(size);
            emptyIndex = size * size - 1;
            let prev = -1;
            const moves = size * size * 10;
            for (let i = 0; i < moves; i++) {
                const ns = getNeighbors(emptyIndex, size).filter(n => n !== prev);
                const pick = ns[Math.floor(Math.random() * ns.length)];
                boardState[emptyIndex] = boardState[pick];
                boardState[pick] = 0;
                prev = emptyIndex;
                emptyIndex = pick;
            }
        }
        function isSolved(size) {
            const solved = createSolved(size);
            for (let i = 0; i < solved.length; i++) {
                if (solved[i] !== boardState[i]) return false;
            }
            return true;
        }

        function startGame(levelId) {
            currentLevelId = levelId;
            const level = levels.find(l => l.id === levelId);
            showScreen('gameplay');
            const titleEl = document.getElementById('level-title');
            if (titleEl) titleEl.innerText = `第${levelId}关`;
            stepCount = 0;
            const stepEl = document.getElementById('step-display');
            if (stepEl) stepEl.innerText = 'STEP: 0';
            const timeEl = document.getElementById('time-display');
            if (timeEl) timeEl.innerText = '00:00';
            initBoard(level.size);
            startTimer();
        }

        function initBoard(size) {
            const board = document.getElementById('board');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            board.style.gridTemplateRows = `repeat(${size}, 1fr)`;
            shuffleBoard(size);
            renderBoardState(size);
        }
        function renderBoardState(size) {
            const board = document.getElementById('board');
            board.innerHTML = '';
            const total = size * size;
            for (let i = 0; i < total; i++) {
                const val = boardState[i];
                const piece = document.createElement('div');
                piece.className = 'puzzle-piece';
                if (val === 0) {
                    piece.classList.add('empty');
                    board.appendChild(piece);
                    continue;
                }
                piece.innerText = val;
                const row = Math.floor((val - 1) / size);
                const col = (val - 1) % size;
                const offset = 300 / size;
                piece.style.backgroundSize = '300px 300px';
                piece.style.backgroundPosition = `-${col * offset}px -${row * offset}px`;
                piece.addEventListener('click', () => {
                    const idx = i;
                    const neighbors = getNeighbors(emptyIndex, size);
                    if (!neighbors.includes(idx)) return;
                    const tmp = boardState[idx];
                    boardState[idx] = 0;
                    boardState[emptyIndex] = tmp;
                    emptyIndex = idx;
                    stepCount += 1;
                    const stepEl = document.getElementById('step-display');
                    if (stepEl) stepEl.innerText = `STEP: ${stepCount}`;
                    renderBoardState(size);
                    if (isSolved(size)) {
                        stopTimer();
                        const resultTimeEl = document.getElementById('result-time');
                        if (resultTimeEl) {
                            resultTimeEl.innerText = document.getElementById('time-display').innerText;
                        }
                        const resultStepEl = document.getElementById('result-step');
                        if (resultStepEl) {
                            resultStepEl.innerText = String(stepCount);
                        }
                        showResult();
                    }
                });
                board.appendChild(piece);
            }
        }

        function showResult() {
            // 拼图成功，收集图片
            if (currentLevelId > 0 && !collectedPhotos.includes(currentLevelId)) {
                collectedPhotos.push(currentLevelId);
            }
            document.getElementById('result-modal').classList.remove('hidden');
        }

        function hideResult() {
            document.getElementById('result-modal').classList.add('hidden');
        }

        function hideEnergy() {
            document.getElementById('energy-modal').classList.add('hidden');
        }

        function nextLevel() {
            hideResult();
            const nextId = Math.min(currentLevelId + 1, LEVEL_COUNT);
            startGame(nextId);
        }

        function showPreview() {
            document.getElementById('preview-modal').classList.remove('hidden');
        }

        function hidePreview() {
            document.getElementById('preview-modal').classList.add('hidden');
        }

        function showSettings() {
            document.getElementById('settings-modal').classList.remove('hidden');
            const backBtn = document.getElementById('settings-back');
            const isInGame = !document.getElementById('gameplay').classList.contains('hidden');
            if (backBtn) backBtn.classList.toggle('hidden', !isInGame);
        }

        function hideSettings() {
            document.getElementById('settings-modal').classList.add('hidden');
        }

        function toggleSwitch(element) {
            // 简单的开关动画逻辑
            const knob = element.querySelector('div');
            const isOn = element.style.background !== 'rgb(153, 153, 153)'; // 检查当前状态

            if (isOn) {
                // 关闭
                element.style.background = '#999';
                knob.style.right = 'auto';
                knob.style.left = '2px';
            } else {
                // 开启
                element.style.background = 'var(--accent-color)';
                knob.style.left = 'auto';
                knob.style.right = '2px';
            }
        }

        // 初始化显示
        updateCountdown();
        setInterval(tickRecovery, 1000);
    </script>
</body>

</html>
